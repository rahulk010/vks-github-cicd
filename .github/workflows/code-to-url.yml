name: VKS OIDC Deploy

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  kube-test:
    runs-on: self-hosted  # This matches the label you just created
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get GitHub OIDC Token
        run: |
          # Exchange the internal request for a real JWT
          # Match the audience to your 'authentication-config.yaml' (e.g. your GitHub URL)
          export JWT_TOKEN=$(curl -sSL -X GET "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=github-test-cluster" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r '.value')

          # Setup kubectl to talk to your PRIVATE API IP
          # Use the IP you've been using (e.g., 172.26.0.3 or your Load Balancer IP)
          kubectl config set-cluster github-test-cluster \
            --server=https:192.168.22.15:6443 \
            --insecure-skip-tls-verify=true

          kubectl config set-credentials github-user --token=$JWT_TOKEN
          kubectl config set-context vks-ctx --cluster=github-test-cluster --user=github-user
          kubectl config use-context vks-ctx

          # This will likely fail with a 403 at first—this is GOOD!
          echo "Testing connection to Private API..."
          kubectl get nodes
