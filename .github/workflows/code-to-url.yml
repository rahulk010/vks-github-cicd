name: VKS OIDC Deploy

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'helm-charts/**'
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write # Required for OIDC
  contents: write # required to write comments on commits ( pushes to main )
  pull-requests: write # required to post comments on Pull requests
  statuses: write # required to post commit status updates
  packages: write # required to push to github packages/GHCR

jobs:
  build-image:
    runs-on: self-hosted  # This matches the label you just created
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      # Checkout the CURRENT repository (where this workflow lives)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: true  # ensure a clean workspace on persistent vm

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      # Authentucate to GHCR using the short-lived Github token
      - name: Login to Github Container Registry ( GHCR )
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Force lowercasing to handle mix-case Github user/repo names
      - name: Inject Lower Repository Env
        run: |
          echo "IMAGE_REPO_LOWER=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      
      # Multi-stage container buils using local caching mechanisms
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_REPO_LOWER }}:${{ github.sha }}
          cache-from: type=gha # github action cache
          cacho-to: type=gha,mode=max 
    
  deploy-app:
    runs-on: self-hosted
    needs: build-image # wait for the image to be pushed before running
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: true

  
      # Authenticate with Kubernetes via OIDC
      - name: Get GitHub OIDC Token
        run: |
          # Exchange the internal request for a real JWT
          # Match the audience to your 'authentication-config.yaml' (e.g. your GitHub URL)
          export JWT_TOKEN=$(curl -sSL -X GET "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=github-test-cluster" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r '.value')

          # Setup kubectl to talk to your PRIVATE API IP
          # Use the IP you've been using (e.g., 172.26.0.3 or your Load Balancer IP)
          kubectl config set-cluster github-test-cluster \
            --server=${{ secrets.K8S_API_URL }} \
            --insecure-skip-tls-verify=true

          kubectl config set-credentials github-user --token=$JWT_TOKEN
          kubectl config set-context vks-ctx --cluster=github-test-cluster --user=github-user
          kubectl config use-context vks-ctx

          # This will likely fail with a 403 at first—this is GOOD!
          echo "Testing connection to Private API..."
          kubectl get nodes

      # Deploy using helm
      - name: Deploy helm chart
        run: |
          echo "Deploying Helm chart to VKS cluster"
          echo "Deploying version ${{ github.sha }} to VKS cluster"
          export GODEBUG=http2client=0
          export IMAGE_REPO="ghcr.io/${{ github.repository }}"
          export IMAGE_REPO_LOWER=$(echo "$IMAGE_REPO" | tr '[:upper:]' '[:lower:]')
          helm upgrade --install todo-app ./helm-charts/ \
            --namespace default \
            --values ./helm-charts/values.yaml \
            --set image.repository=$IMAGE_REPO_LOWER \
            --set image.tag=${{ github.sha }} \
            --set env.todoPassword=${{ secrets.TODO_PASSWORD }} \
            --history-max 5
          #helm upgrade --install demo-app ./helm-charts-repo/ --namespace default --values ./helm-charts-repo/values-vks-agents.yaml --history-max 5
          
         
      - name: Install envsubst (gettext)
        run: |
          if ! command -v envsubst &> /dev/null; then
            echo "envsubst not found, installing..."
            sudo apt-get update && sudo apt-get install -y gettext
          fi

      # Generate dynamic istio routing
      - name: Generate Dynamic Istio Routing
        env:
          #PR_NUMBER: ${{ github.event.number || 'main' }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'main' }}
        run: |
          # Replace placeholders in template and output a deployable file
          envsubst < ./istio-preview-template.yaml > ./rendered-istio-routing.yaml
          echo "==Rendered Manifest Preview=="
          cat ./rendered-istio-routing.yaml

      # Apply dynamic routing to VKS cluster
      - name: Apply Dynamic Istio Routing
        run: |
          echo "Applying dynamic Ingress & Routing to VKS cluster..."
          kubectl apply -f ./rendered-istio-routing.yaml
  notify:
    runs-on: self-hosted
    needs: deploy-app
    if: always() # run even if deployment fails, so you get failure feedback info
    steps:
      # Native Github Feedback Loop
      - name: Post Live URL Feedback
        uses: actions/github-script@v8
        with:
          script: |
            // Calculate the dynamic URL based on the event type
            const deployStatus = "{{ needs.deploy-app.result }}";
            const isPR = context.eventName === 'pull_request';
            const identifier = isPR ? `pr-${context.issue.number}` : 'main';
            const liveUrl = `http://${identifier}.sfo.rainpole.io`;

            let commentBody = "";
            
            // Build a markdown comment block
            if (deployStatus === 'success') {
              commentBody = `### Deployment Successful to VKS!\n\n` +
                            `Your changes have been deployed to your ephemeral preview environment.\n\n` +
                            `* **Live URL:** [${liveUrl}](${liveUrl})\n` +
                            `* **Environment Context:** \`${identifier}\`\n\n` +
                            `_To view full execution logs, click on the **Actions** tab above._`;
            } else {
              commentBody = `### Deployment Failed to VKS!\n\n` +
                            `The automated "Code-to-URL" workflow encountered an error while updating your environment configuration.\n\n` +
                            `* **Target Environment Context:** \`${identifier}\`\n` +
                            `* **Status:** \`${deployStatus.toUpperCase()}\`\n\n` +
                            `Please click on the **Actions** tab above to review the pipeline logs and debug network/auth failures.`;
            }

            
            // Post to PR timeline if it's a pull request
            if (isPR) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            } else {
              // Fallback: Post to the Commit timeline if it's a direct push to main
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: commentBody
              });
            }
          
      
